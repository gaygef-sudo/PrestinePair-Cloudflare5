<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Cancelled — Prestine Pair Cleaning and Care</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#3a5568 0%,#2d3748 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{background:#fff;border-radius:28px;padding:56px 48px;max-width:520px;width:100%;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,0.22);animation:popIn 0.4s ease both;}
  @keyframes popIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:none;}}
  .icon{font-size:3.5rem;margin-bottom:20px;}
  h1{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:700;color:#1a2a38;margin-bottom:12px;}
  p{font-size:1rem;color:#3a5568;line-height:1.7;margin-bottom:28px;}
  .options{display:flex;flex-direction:column;gap:12px;}
  .btn-p{display:block;background:linear-gradient(135deg,#1a6fbf,#0d4f8c);color:white;text-decoration:none;padding:16px;border-radius:50px;font-weight:800;font-size:1rem;}
  .btn-s{display:block;background:#eef4f8;color:#3a5568;text-decoration:none;padding:16px;border-radius:50px;font-weight:700;font-size:0.95rem;}
  .logo{max-height:65px;margin:0 auto 24px;display:block;}
</style>
</head>
<body>
<div class="card">
  <img src="logo.jpg" alt="Prestine Pair" class="logo" onerror="this.style.display='none'">
  <div class="icon">🙁</div>
  <h1>Payment Cancelled</h1>
  <p>No worries — your payment was not processed and you haven't been charged. Ready to try again?</p>
  <div class="options">
    <a href="/#booking" class="btn-p">↩ Return to Booking</a>
    <a href="tel:+17726349680" class="btn-s">📞 Call Us Instead — 772-634-9680</a>
    <a href="/" class="btn-s">← Back to Home</a>
  </div>
</div>
</body>
</html>
